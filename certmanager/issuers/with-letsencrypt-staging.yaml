# Issuer is a namespaces resource, so certificate must be in the same namespace.
# ClusterIssuer is on the other hand, can consume all certificate within the cluster.
# Choose one only.
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: issuer-letsencrypt
  namespace: cert-letsencrypt
spec:
  ca:
    # cert-manager store certificate as Kubernetes secret.
    # secretName: letsencrypt-certificate
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: email@gmail.com
    profile: tlsserver
    privateKeySecretRef:
      name: letsencrypt-staging
    # Enable http-01 challenge provider.
    solvers:
      - http01:
          ingress:
            # Refer to ingress controller class resource.
            ingressClassName: prod
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: ca-issuer
spec:
  ca:
    secretName: letsencrypt-certificate
